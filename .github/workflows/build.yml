name: Build-OpenWrt-BandPush

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '请填写发布Releases的版本号（留空不发布）'
        required: false
        default: ''
      text:
        description: '请填写发布的说明'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_cortex-a72
            sdk: 22.03.7
          - arch: aarch64_cortex-a72
            sdk: SNAPSHOT
          - arch: x86_64
            sdk: 22.03.7
          - arch: x86_64
            sdk: SNAPSHOT

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Building packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: src
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1
          MAKEFLAGS: -j$(nproc)
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/*

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.tag != '' }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release info
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          mkdir -p release
          for dir in artifacts/*; do
            name=$(basename "$dir")
            zip -j "release/BandPush-${{ env.TAG }}-${name}.zip" "$dir"/*.ipk "$dir"/*.apk 2>/dev/null || true
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            > ### BandPush ${{ env.TAG }}
            > 编译时间: ${{ github.event.inputs.text }}

            - **`22.03.7`** 里面是 ipk 安装包
            - **`SNAPSHOT`** 里面是 apk 安装包

          tag_name: ${{ env.TAG }}
          files: release/*.zip