name: Build BandPush

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            sdk_url: https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz

          - name: aarch64_cortex-a72
            sdk_url: https://downloads.openwrt.org/releases/22.03.7/targets/armsr/armv8/openwrt-sdk-22.03.7-armsr-armv8_gcc-11.2.0_musl.Linux-x86_64.tar.xz

    steps:
      - uses: actions/checkout@v4
        with:
          path: mypackage

      - name: Download SDK
        run: |
          wget -q ${{ matrix.sdk_url }}
          tar xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Copy package
        run: |
          cp -r mypackage/luci-app-bandpush sdk/package/

      - name: Build
        run: |
          cd sdk
          make package/luci-app-bandpush/compile V=s -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: sdk/bin/packages/**/luci-app-bandpush*.ipk